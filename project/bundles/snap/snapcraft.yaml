---
name: digikam
base: core24
adopt-info: digikam
grade: stable
confinement: strict

apps:
  digikam:
    command: usr/bin/digikam
    common-id: org.kde.digikam.desktop
    desktop: usr/share/applications/org.kde.digikam.desktop
    extensions:
      - kde-neon-6
    plugs:
      - audio-playback
      - camera
      - home
      - mount-observe
      - network
      - network-bind
      - network-manager-observe
      - removable-media
      - udisks2
      - cups
      - hardware-observe
      - browser-support
    environment:
      DK_PLUGIN_PATH: "$SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/plugins/digikam"
      DICPATH: "$SNAP/usr/share/hunspell"
      PERL5LIB: "$SNAP/usr/share/perl5"
      LD_LIBRARY_PATH: $SNAP/ffmpeg-platform/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR:/snap/kde-qt6-core24-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/libproxy${LD_LIBRARY_PATH}
      PATH: $SNAP/ffmpeg-platform/usr/bin:$SNAP/usr/bin${PATH}
      ALSA_CONFIG_PATH: "$SNAP/kf6/etc/asound.conf"
      QT_MEDIA_BACKEND: "ffmpeg"
      QT_PLUGIN_PATH: "$QT_PLUGIN_PATH:$SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/marble/plugins"
      QTWEBENGINE_DISABLE_SANDBOX: 1
      XDG_DATA_DIRS: "$XDG_DATA_DIRS:$SNAP/usr/share"
      XDG_CONFIG_DIRS: "$XDG_CONFIG_DIRS:$SNAP/etc/xdg"
layout:
  /usr/share/marble:
    symlink: $SNAP/usr/share/marble
  /usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/marble:
    symlink: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/marble
plugs:
  hunspell-dictionaries:
    content: hunspell-dictionaries
    interface: content
    target: "$SNAP/usr/share/hunspell"
    default-provider: hunspell-dictionaries
  ffmpeg-2404:
    interface: content
    target: ffmpeg-platform # the folder where this content snap will be mounted
    default-provider: ffmpeg-2404

slots:
  session-dbus-interface:
    interface: dbus
    name: org.kde.digikam
    bus: session

parts:
  marble:
    source: https://invent.kde.org/education/marble.git
    source-branch: release/24.12
    plugin: cmake
    build-packages:
      - libpulse0
      - rsync
    stage-packages:
      - libpulse0
    cmake-generator: Ninja
    cmake-parameters:
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_BUILD_TYPE=Release
      - -DQT_MAJOR_VERSION=6
      - -DENABLE_QT5=OFF
      - -DENABLE_QT6=ON
      - -DBUILD_TESTING=OFF
      - -DCMAKE_INSTALL_SYSCONFDIR=/etc
      - -DCMAKE_INSTALL_LOCALSTATEDIR=/var
      - -DCMAKE_EXPORT_NO_PACKAGE_REGISTRY=ON
      - -DCMAKE_FIND_USE_PACKAGE_REGISTRY=OFF
      - -DCMAKE_FIND_PACKAGE_NO_PACKAGE_REGISTRY=ON
      - -DCMAKE_INSTALL_RUNSTATEDIR=/run
      - -DCMAKE_SKIP_INSTALL_ALL_DEPENDENCY=ON
      - -DCMAKE_VERBOSE_MAKEFILE=ON
      - -DCMAKE_INSTALL_LIBDIR=lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR
      - --log-level=STATUS
      - -DCMAKE_LIBRARY_PATH=lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR
    override-build: |
      craftctl default
      rsync -a --ignore-existing $CRAFT_PART_INSTALL/ /
    build-environment: &build-environment
      - CMAKE_FIND_ROOT_PATH: "${CMAKE_FIND_ROOT_PATH}:/snap/ffmpeg-2404-sdk/current"
      - PKG_CONFIG_PATH: "$CRAFT_STAGE/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/pkgconfig:/snap/ffmpeg-2404-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/pkgconfig"
      - LD_LIBRARY_PATH: "/snap/mesa-2404/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR:$CRAFT_STAGE/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR:/snap/ffmpeg-2404-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR:/snap/kde-qt6-core24-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET_BUILD_FOR/libproxy:$LD_LIBRARY_PATH"
      - DICPATH: "$SNAP/usr/share/hunspell"
    prime:
      - -usr/bin/rsync
  digikam:
    after:
      - marble
      # - libva
    parse-info:
      - usr/share/metainfo/org.kde.digikam.appdata.xml
    source: http://download.kde.org/stable/digikam/8.5.0/digiKam-8.5.0.tar.xz
    plugin: cmake
    cmake-generator: Ninja
    cmake-parameters:
      - -DBUILD_WITH_QT6=ON
      - -DKDE_INSTALL_USE_QT_SYS_PATHS=FALSE
      - -DCMAKE_INSTALL_PREFIX=/usr
      - -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
      - -DBUILD_TESTING=OFF
      - -DDIGIKAMSC_CHECKOUT_PO=OFF
      - -DDIGIKAMSC_CHECKOUT_DOC=OFF
      - -DDIGIKAMSC_COMPILE_PO=OFF
      - -DDIGIKAMSC_COMPILE_DOC=ON
      - -DDIGIKAMSC_COMPILE_DIGIKAM=ON
      - -DENABLE_KFILEMETADATASUPPORT=OFF
      - -DENABLE_AKONADICONTACTSUPPORT=OFF
      - -DENABLE_MYSQLSUPPORT=ON
      - -DENABLE_INTERNALMYSQL=OFF
      - -DENABLE_MEDIAPLAYER=ON
      - -DENABLE_LCMS2=ON
      - -DDIGIKAMSC_USE_PRIVATE_KDEGRAPHICS=OFF
      - -DENABLE_DBUS=ON
      - -DENABLE_APPSTYLES=ON
      - -DENABLE_QWEBENGINE=ON
      - -DENABLE_FACESENGINE_DNN=ON
      - -DCMAKE_CXX_FLAGS="-DMAGICKCORE_HAVE_ISNAN=0"
    build-environment: *build-environment
    build-packages:
      - bison
      - flex
      - gphoto2
      - libboost-graph-dev
      - libeigen3-dev
      - libexiv2-dev
      - libexpat1-dev
      - libheif-dev
      - libgphoto2-dev
      - libjpeg-dev
      - liblcms2-dev
      - liblensfun-dev
      - libmagick++-dev
      - libopencv-dev
      - libpng-dev
      - libtiff-dev
      - libusb-1.0-0-dev
      - libxslt1-dev
      - libxml2-dev
      - libglib2.0-dev
      - libpulse0
      - libmariadb-dev
      - libxkbcommon-dev
    build-snaps:
      - hunspell-dictionaries
      - ffmpeg-2404-sdk
    stage-packages:
      - libexif12
      - libgphoto2-6
      - libgphoto2-port12
      - libheif1
      - libimage-exiftool-perl
      - libjpeg8
      - libjpeg-turbo8
      - liblensfun1
      - libltdl7
      - libtbb12
      - libwlocate0
      - libshp4
      - libx265-199
      - libxerces-c3.2
      - liburiparser1
      - libsz2
      - libsuperlu6
      - libspatialite8t64
      - librttopo1
      - libqhull-r8.0
      - libprotobuf32t64
      - libproj25
      - libpoppler134
      - libopencv-ml406t64
      - libopencv-imgproc406t64
      - libopencv-imgcodecs406t64
      - libopencv-dnn406t64
      - libopencv-core406t64
      - libopencv-objdetect406t64
      - libodbcinst2
      - libnetcdf19
      - libkmlengine1
      - libkmldom1
      - libkmlbase1
      - libhdf5-103-1t64
      - libhdf5-hl-100t64
      - libgif7
      - libgeotiff5
      - libgeos-c1t64
      - libgeos3.12.1t64
      - libgdcm3.0
      - libfyba0
      - libfreexl1
      - libfftw3-single3
      - libcharls2
      - libcfitsio10t64
      - libblosc1
      - libarpack2
      - libaec0
      - libmagickwand-6.q16-7t64
      - libmagickcore-6.q16-7t64
      - libmagick++-6.q16-9t64
      - libimath-3-1-29
      - libogdi4.1
      - libgdal34t64
      - libarmadillo12
      - libblas3
      - kimageformat-plugins
      - libpulse0
      - mariadb-client
      - mariadb-server
      - cups-client
      - libxkbcommon0
      - exiftool
      - bash
    override-pull: |
        craftctl default
        patch -p0 < ${SNAPCRAFT_PROJECT_DIR}/project/bundles/snap/snap/local/digikam_magick_isnan.patch
    prime:
      - -usr/lib/*/cmake/*
      - -usr/include/*
      - -usr/share/ECM/*
      - -usr/share/man/*
      - -usr/bin/X11
      - -usr/lib/gcc/$CRAFT_ARCH_TRIPLET_BUILD_FOR/6.0.0
      - -usr/lib/aspell/*
      - -usr/share/lintian
  gpu-2404:
    after: [digikam]
    source: https://github.com/canonical/gpu-snap.git
    plugin: dump
    override-prime: |
      craftctl default
      ${CRAFT_PART_SRC}/bin/gpu-2404-cleanup mesa-2404
    prime:
      - bin/gpu-2404-wrapper
  cleanup:
    after:
      - digikam
      - marble
    plugin: nil
    build-snaps:
      - core24
      - kf6-core24
    override-prime: |
      set -eux
      for snap in "core24" "kf6-core24"; do
          cd "/snap/$snap/current" && find . -type f,l -exec rm -rf "${CRAFT_PRIME}/{}" \;
      done

